<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
<div class="calculator">
    <input type="text" id="display" value="0" required>
        <div class="row1">
            <button class="btncolor" onclick="clearDisplay()" style="background-color: greenyellow;">AC</button>
            <button class="btncolor" onclick="backspace()" style="background-color: greenyellow;">DEL</button>
            <button class="btncolor" onclick="appendOperation('%')">%</button>
            <button class="btncolor" onclick="appendOperation('/')">/</button>
        </div>
        <div class="row2">
            <button class="btn" onclick="appendToDisplay('7')">7</button>
            <button class="btn" onclick="appendToDisplay('8')">8</button>
            <button class="btn" onclick="appendToDisplay('9')">9</button>
            <button class="btncolor" onclick="appendOperation('*')">*</button>
        </div>
        <div class="row3">
            <button class="btn" onclick="appendToDisplay('4')">4</button>
            <button class="btn" onclick="appendToDisplay('5')">5</button>
            <button class="btn" onclick="appendToDisplay('6')">6</button>
            <button class="btncolor" onclick="appendOperation('-')">-</button>
        </div>
        <div class="row4">
            <button class="btn" onclick="appendToDisplay('1')">1</button>
            <button class="btn" onclick="appendToDisplay('2')">2</button>
            <button class="btn" onclick="appendToDisplay('3')">3</button>
            <button class="btncolor" onclick="appendOperation('+')">+</button>
        </div>
            <div class="row5">
            <button class="btn" onclick="appendToDisplay('0')">0</button>
            <button class="btn" onclick="appendToDisplay('.')">.</button>
            <button class="btn" onclick="appendToDisplay('00')">00</button>
            <button class="btncolor" onclick="calculate()" style="background-color: greenyellow;">=</button>
        </div>
</div>

<script src="calculator.js"></script>

</body>
</html>
